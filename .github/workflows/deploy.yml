name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      init_db:
        description: 'Apply schema.sql + seed.sql to D1 (run once on first setup)'
        type: boolean
        default: false
      push_secrets:
        description: 'Push secrets to Cloudflare Worker (requires secrets in GitHub)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  init-db:
    runs-on: ubuntu-latest
    name: Init D1 Database
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.init_db == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Apply schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute momozberries-db --file=schema.sql --remote

      - name: Seed products
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute momozberries-db --file=seed.sql --remote

  push-secrets:
    runs-on: ubuntu-latest
    name: Push Secrets to Cloudflare
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_secrets == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Push STRIPE_SECRET_KEY
        if: ${{ secrets.STRIPE_SECRET_KEY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.STRIPE_SECRET_KEY }}
        run: echo "$SECRET_VALUE" | wrangler secret put STRIPE_SECRET_KEY

      - name: Push STRIPE_WEBHOOK_SECRET
        if: ${{ secrets.STRIPE_WEBHOOK_SECRET != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: echo "$SECRET_VALUE" | wrangler secret put STRIPE_WEBHOOK_SECRET

      - name: Push ADMIN_PASSWORD
        if: ${{ secrets.ADMIN_PASSWORD != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.ADMIN_PASSWORD }}
        run: echo "$SECRET_VALUE" | wrangler secret put ADMIN_PASSWORD

      - name: Push JWT_SECRET
        if: ${{ secrets.JWT_SECRET != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets.JWT_SECRET }}
        run: echo "$SECRET_VALUE" | wrangler secret put JWT_SECRET
