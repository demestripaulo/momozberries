name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      init_db:
        description: 'Apply schema.sql + seed.sql to D1 (run once on first setup)'
        type: boolean
        default: false
      push_secrets:
        description: 'Push secrets to Cloudflare Worker (requires secrets in GitHub)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  init-db:
    runs-on: ubuntu-latest
    name: Init D1 Database
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.init_db == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Apply schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute momozberries-db --file=schema.sql --remote

      - name: Seed products
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute momozberries-db --file=seed.sql --remote

  push-secrets:
    runs-on: ubuntu-latest
    name: Push Secrets to Cloudflare
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_secrets == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Push secrets to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAL_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VAL_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          VAL_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VAL_JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -n "$VAL_STRIPE_SECRET_KEY" ]; then
            echo "$VAL_STRIPE_SECRET_KEY" | wrangler secret put STRIPE_SECRET_KEY
          else
            echo "⚠️  STRIPE_SECRET_KEY not set in GitHub Secrets — skipping"
          fi

          if [ -n "$VAL_STRIPE_WEBHOOK_SECRET" ]; then
            echo "$VAL_STRIPE_WEBHOOK_SECRET" | wrangler secret put STRIPE_WEBHOOK_SECRET
          else
            echo "⚠️  STRIPE_WEBHOOK_SECRET not set in GitHub Secrets — skipping"
          fi

          if [ -n "$VAL_ADMIN_PASSWORD" ]; then
            echo "$VAL_ADMIN_PASSWORD" | wrangler secret put ADMIN_PASSWORD
          else
            echo "⚠️  ADMIN_PASSWORD not set in GitHub Secrets — skipping"
          fi

          if [ -n "$VAL_JWT_SECRET" ]; then
            echo "$VAL_JWT_SECRET" | wrangler secret put JWT_SECRET
          else
            echo "⚠️  JWT_SECRET not set in GitHub Secrets — skipping"
          fi
