name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      init_db:
        description: 'Apply schema.sql to D1 database'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  init-db:
    runs-on: ubuntu-latest
    name: Init D1 Database
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.init_db == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute momozberries-db --file=schema.sql --remote
